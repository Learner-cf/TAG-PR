device: 5

misc:
  seed: 0

num_of_experts_groups: 2
num_of_experts: 6
num_of_selected_experts: 5
expert_blocks: [6, 7, 8]

experiment:
  # image
  input_resolution: [224, 224]
  # text
  dropout: 0.05
  text_length: 77
  # loss
  nitc_ratio: 1.0
  ####
  ritc: true
  ritc_eps: 1.0e-2
  ritc_ratio: 1.0
  ####
  id: true
  id_ratio: 0.5

schedule:
  lr: 1.0e-4
  epoch: 10
  epoch_warmup: 1
  lr_start: 1.0e-6
  lr_end: 5.0e-6
  weight_decay: 0.02
  betas: [0.9, 0.98]
  eps: 1.0e-8
  ratio_factor: 1.0

model:
  ckpt_type: original_clip  # original_clip / saved
  saved_path: 'ckpts/'
  checkpoint: '/path/to/clip/ViT-B-16.pt'    # e.g., '../../data/CLIP/ViT-B-16.pt'
  use_gather: true
  softlabel_ratio: 0.5
  embed_dim: 512
  vocab_size: 49408

log:
  print_period: 50

data:
  batch_size: 80
  test_batch_size: 256
  num_workers: 8

distributed:
  backend: nccl
  url: 'env://'

anno_dir: "/path/to/dataset/anno_dir"   
image_dir: "/path/to/dataset/images"     